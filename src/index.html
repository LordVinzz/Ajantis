<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajantis</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0; padding: 0;
        display: flex; flex-direction: column;
        height: 100vh; background-color: #f9f9f9;
      }

      /* ── Tabs ── */
      #tabs {
        display: flex; background: #fff; border-bottom: 2px solid #ddd;
      }
      .tab-btn {
        flex: 1; padding: 10px; border: none; background: transparent;
        font-size: 0.95rem; cursor: pointer; color: #666;
        border-bottom: 2px solid transparent; margin-bottom: -2px;
      }
      .tab-btn.active { color: #007aff; border-bottom-color: #007aff; font-weight: 600; }
      .tab-content { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
      .tab-content.active { display: flex; }

      /* ── Chat tab ── */
      #messages {
        flex: 1; overflow-y: auto; padding: 20px 15px;
        background-color: #e4e4e4; display: flex;
        flex-direction: column; gap: 10px;
      }
      .message {
        max-width: 80%; padding: 10px 15px; border-radius: 20px;
        line-height: 1.3; word-wrap: break-word;
        box-shadow: 0 1px 0.5px rgba(0,0,0,0.1);
      }
      .sent { background-color: #dcf8c6; color: black; align-self: flex-end; border-bottom-right-radius: 5px; }
      .received { background-color: #fff; color: black; align-self: flex-start; border-bottom-left-radius: 5px; }
      .received.for-user { background-color: #007aff; color: #fff; }
      .received.for-user .msg-agent-name { color: rgba(255,255,255,0.7); }
      .received.internal { cursor: pointer; }
      .received.internal .msg-body { display: none; }
      .received.internal.expanded .msg-body { display: block; }
      .received.internal .msg-collapsed-hint {
        font-size: 0.8rem; font-style: italic; opacity: 0.6;
      }
      .received.internal.expanded .msg-collapsed-hint { display: none; }
      .msg-agent-name { font-size: 0.75rem; color: #888; margin-bottom: 2px; }

      #chat-form {
        display: flex; padding: 10px; border-top: 1px solid #ccc;
        background: #fff; gap: 8px; align-items: center;
      }
      #chat-input {
        flex: 1; padding: 10px; border-radius: 25px; border: 1px solid #ccc;
        font-size: 1rem; outline: none;
      }

      /* ── Agents tab ── */
      #agents-panel { padding: 12px; }
      .agent-card {
        border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 10px;
        background: #fff; transition: opacity 0.2s;
      }
      .agent-card.disarmed { opacity: 0.5; }
      .agent-card.user-agent { border-left: 3px solid #007aff; }
      .agent-card.model-agent { border-left: 3px solid #34c759; }
      .agent-card.model-agent.disarmed { border-left-color: #999; }
      .btn-arm { font-weight: 600; min-width: 70px; }
      .btn-arm.armed { background: #34c759; color: #fff; border: none; }
      .btn-arm.disarmed { background: #f5f5f5; color: #999; border: 1px solid #ccc; }
      .agent-card label { display: block; font-size: 0.8rem; color: #666; margin-top: 6px; }
      .agent-card input, .agent-card select, .agent-card textarea {
        width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px;
        font-size: 0.9rem; margin-top: 2px;
      }
      .agent-card textarea { resize: vertical; min-height: 50px; }
      .agent-actions { display: flex; gap: 6px; margin-top: 8px; }
      .agent-actions button { padding: 4px 12px; font-size: 0.8rem; border-radius: 12px; border: 1px solid #ccc; cursor: pointer; }

      .config-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
      .config-row label { display: inline-flex; align-items: center; gap: 4px; margin: 0; font-size: 0.8rem; }
      .config-row input[type="number"] { width: 80px; padding: 4px; }
      .config-row input[type="checkbox"] { width: auto; }

      .mode-row { display: flex; gap: 12px; margin-top: 4px; }
      .mode-row label { display: inline-flex; align-items: center; gap: 4px; font-size: 0.85rem; }
      .mode-row input { width: auto; }

      #agents-toolbar { display: flex; gap: 8px; margin-bottom: 10px; }
      #agents-toolbar button {
        padding: 6px 14px; border-radius: 16px; border: none; cursor: pointer;
        font-size: 0.85rem; background: #007aff; color: #fff;
      }

      /* ── Routing tab ── */
      #routing-panel { padding: 12px; }
      #routing-matrix { border-collapse: collapse; width: 100%; }
      #routing-matrix th, #routing-matrix td {
        border: 1px solid #ddd; padding: 6px 8px; text-align: center; font-size: 0.85rem;
      }
      #routing-matrix th { background: #f5f5f5; font-weight: 600; }
      #routing-matrix td.diagonal { background: #eee; }

      /* ── Connection rules ── */
      #connection-rules { margin-top: 16px; }
      #connection-rules h4 { margin: 0 0 8px; font-size: 0.9rem; color: #444; }
      .conn-rule {
        display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 6px;
        background: #fff; margin-bottom: 6px; font-size: 0.82rem;
      }
      .conn-label { font-weight: 600; color: #333; min-width: 160px; }
      .conn-rule label { display: inline-flex; align-items: center; gap: 4px; margin: 0; color: #555; }
      .conn-rule input[type="number"] { width: 54px; padding: 3px 5px; border: 1px solid #ccc; border-radius: 4px; }
      .conn-rule input[type="text"]   { width: 140px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; }

      /* ── Tool call rows (inside manager bubble) ── */
      .tool-calls { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
      .tool-item {
        font-size: 0.78rem; border-radius: 6px; overflow: hidden;
        border-left: 3px solid #ff9500; background: rgba(0,0,0,0.05);
        cursor: pointer; user-select: none;
      }
      .tool-header {
        display: flex; align-items: center; gap: 6px;
        padding: 4px 8px; flex-wrap: wrap;
      }
      .tool-icon { color: #ff9500; font-size: 0.85rem; }
      .tool-name { font-weight: 700; color: #e07000; }
      .tool-args-preview {
        flex: 1; color: #666; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap; max-width: 220px;
        font-family: monospace; font-size: 0.72rem;
      }
      .tool-status { font-size: 0.7rem; margin-left: auto; white-space: nowrap; }
      .tool-status.pending { color: #aaa; }
      .tool-status.done    { color: #34c759; }
      .tool-status.error   { color: #c00; }
      .tool-detail {
        display: none; padding: 6px 8px; border-top: 1px solid rgba(0,0,0,0.08);
        font-family: monospace; font-size: 0.72rem; white-space: pre-wrap;
        word-break: break-all; max-height: 220px; overflow-y: auto;
        background: rgba(255,255,255,0.5);
      }
      .tool-item.expanded .tool-detail { display: block; }
      .tool-detail-label { font-weight: 700; color: #888; font-size: 0.68rem;
        text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }

      /* ── Manager badge ── */
      .manager-badge {
        display: inline-block; padding: 1px 7px; border-radius: 10px;
        background: #ff9500; color: #fff; font-size: 0.7rem; font-weight: 700;
        vertical-align: middle; margin-left: 4px;
      }
      .agent-card.manager-agent { border-left: 3px solid #ff9500; }

      /* ── Loaded models bar ── */
      #loaded-bar {
        padding: 6px 10px; background: #fff; border-bottom: 1px solid #ddd;
        font-size: 0.82rem; color: #555;
      }

      /* ── Common buttons ── */
      button { cursor: pointer; }
      button:disabled { opacity: 0.5; cursor: default; }
      .btn-primary { background: #007aff; color: #fff; border: none; padding: 10px 18px; border-radius: 20px; font-size: 1rem; }
      .btn-danger { background: #f5f5f5; color: #c00; border: 1px solid #ccc; }
    </style>
  </head>
  <body>
    <div id="tabs">
      <button class="tab-btn active" data-tab="chat">Chat</button>
      <button class="tab-btn" data-tab="agents">Agents</button>
      <button class="tab-btn" data-tab="routing">Routing</button>
    </div>

    <div id="loaded-bar"></div>

    <!-- Chat Tab -->
    <div id="tab-chat" class="tab-content active">
      <div id="messages"></div>
      <form id="chat-form">
        <input id="chat-input" type="text" autocomplete="off" placeholder="Type a message..." />
        <button type="submit" class="btn-primary">Send</button>
      </form>
    </div>

    <!-- Agents Tab -->
    <div id="tab-agents" class="tab-content">
      <div id="agents-panel">
        <div id="agents-toolbar">
          <button id="addAgentBtn">+ Add Agent</button>
          <button id="saveConfigBtn" style="background:#34c759;">Save Config</button>
          <button id="reloadConfigBtn" style="background:#ff9500;">Reload Config</button>
        </div>
        <div id="agents-list"></div>
      </div>
    </div>

    <!-- Routing Tab -->
    <div id="tab-routing" class="tab-content">
      <div id="routing-panel">
        <p style="font-size:0.85rem;color:#666;margin-top:0;">Rows = sender, Columns = receiver. Check a cell to route messages from sender to receiver.</p>
        <table id="routing-matrix"></table>
        <div id="connection-rules"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
