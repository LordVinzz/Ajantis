<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajantis</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Mono", "IBM Plex Mono", Consolas, monospace;
        background: #0f172a;
        color: #e2e8f0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 38%),
          linear-gradient(180deg, #0f172a 0%, #020617 100%);
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.2rem);
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: #cbd5e1;
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(148, 163, 184, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ajantis</h1>
      <p>The React frontend has been removed from this repository.</p>
      <p>Use the terminal UI with <code>npm run dev:tui</code> or build it with <code>npm run build:tui</code>.</p>
    </main>
  </body>
</html>
